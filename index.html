<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaceHub PRO - Motor Enciclopedia 2026</title>
    <style>
        :root {
            --bg-dark: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc; --text-muted: #94a3b8;
            --f1-color: #E10600; --motogp-color: #df2020; --wec-color: #2563eb;
            --gt3-color: #0ea5e9; --gt4-color: #ea580c; --dtm-color: #eab308; --nls-color: #16a34a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text-main); margin: 0; padding: 0;
            background: #121212; 
            background: linear-gradient(135deg, #121212 25%, #1a1a1a 25%, #1a1a1a 50%, #121212 50%, #121212 75%, #1a1a1a 75%, #1a1a1a);
            background-size: 40px 40px; background-attachment: fixed; animation: move 4s linear infinite;
        }

        @keyframes move { 0% { background-position: 0 0; } 100% { background-position: 40px 40px; } }

        header {
            background-color: rgba(2, 6, 23, 0.85); backdrop-filter: blur(10px);
            padding: 40px 20px; text-align: center; border-bottom: 2px solid #334155; position: relative;
        }

        h1 { margin: 0; font-size: 2.8em; font-weight: 900; letter-spacing: -1px; }
        h1 span { color: var(--f1-color); }
        .subtitle { color: var(--text-muted); font-size: 1.1em; margin-top: 10px; }

        .filters {
            display: flex; justify-content: center; align-items: center; gap: 12px;
            padding: 20px; flex-wrap: wrap; position: sticky; top: 0;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(8px); z-index: 100;
        }

        .btn {
            background-color: #334155; color: white; border: 2px solid transparent; padding: 8px 16px;
            border-radius: 30px; cursor: pointer; font-weight: 600; transition: all 0.2s ease;
            display: flex; align-items: center; gap: 8px; height: 42px;
        }

        .btn:hover { transform: translateY(-2px); }
        .btn.active { background-color: white; color: black; }
        
        .cat-logo { height: 22px; width: auto; background-color: white; padding: 2px 6px; border-radius: 4px; object-fit: contain; }

        .btn[data-cat="f1"]:hover, .btn[data-cat="f1"].active { background-color: var(--f1-color); color: white; border-color: var(--f1-color); }
        .btn[data-cat="motogp"]:hover, .btn[data-cat="motogp"].active { background-color: var(--motogp-color); color: white; border-color: var(--motogp-color); }
        .btn[data-cat="wec"]:hover, .btn[data-cat="wec"].active { background-color: var(--wec-color); color: white; border-color: var(--wec-color); }
        .btn[data-cat="gt3"]:hover, .btn[data-cat="gt3"].active { background-color: var(--gt3-color); color: white; border-color: var(--gt3-color); }
        .btn[data-cat="gt4"]:hover, .btn[data-cat="gt4"].active { background-color: var(--gt4-color); color: white; border-color: var(--gt4-color); }
        .btn[data-cat="dtm"]:hover, .btn[data-cat="dtm"].active { background-color: var(--dtm-color); color: black; border-color: var(--dtm-color); }
        .btn[data-cat="nls"]:hover, .btn[data-cat="nls"].active { background-color: var(--nls-color); color: white; border-color: var(--nls-color); }

        .calendar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 25px; max-width: 1400px; margin: 0 auto; padding: 20px; }

        .card {
            background: var(--card-bg); border-radius: 16px; overflow: hidden; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.8); transition: transform 0.2s ease;
            position: relative; display: flex; flex-direction: column; border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .card:hover { transform: scale(1.02); }

        .card-header { padding: 10px 20px; font-weight: 800; font-size: 1.1em; text-transform: uppercase; letter-spacing: 1px; display: flex; justify-content: space-between; align-items: center; }

        .bg-f1 { background-color: var(--f1-color); color: white; }
        .bg-motogp { background-color: var(--motogp-color); color: white; }
        .bg-wec { background-color: var(--wec-color); color: white; }
        .bg-gt3 { background-color: var(--gt3-color); color: white; }
        .bg-gt4 { background-color: var(--gt4-color); color: white; }
        .bg-dtm { background-color: var(--dtm-color); color: black; }
        .bg-nls { background-color: var(--nls-color); color: white; }

        .card-body { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; gap: 12px;}
        .event-title { margin: 0 0 5px 0; font-size: 1.5em; line-height: 1.2; }
        
        .countdown-badge {
            background: rgba(0, 0, 0, 0.2); padding: 10px; border-radius: 8px; font-family: monospace; font-size: 1.15em;
            text-align: center; font-weight: bold; color: #38bdf8; border: 1px solid rgba(56, 189, 248, 0.2); margin-bottom: 5px;
        }

        .info-row { display: flex; align-items: flex-start; gap: 10px; color: var(--text-muted); font-size: 0.95em; }
        .info-row strong { color: var(--text-main); }
        .icon { font-size: 1.2em; min-width: 25px; text-align: center; }
        
        .schedule-accordion { margin-top: 5px; background: rgba(0, 0, 0, 0.15); border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .schedule-accordion summary { padding: 12px; cursor: pointer; font-weight: 600; font-size: 0.95em; color: var(--text-main); list-style: none; display: flex; align-items: center; gap: 8px; }
        .schedule-accordion summary::-webkit-details-marker { display: none; }
        .schedule-accordion summary:hover { background: rgba(255, 255, 255, 0.05); border-radius: 8px; }
        .schedule-list { list-style: none; padding: 0 15px 15px 15px; margin: 0; display: flex; flex-direction: column; gap: 8px; font-size: 0.9em; }
        .schedule-list li { display: flex; justify-content: space-between; padding-bottom: 5px; border-bottom: 1px dashed rgba(255, 255, 255, 0.1); color: var(--text-muted); }
        .schedule-list li.main-race { border-bottom: none; font-weight: bold; color: #38bdf8; padding-bottom: 0; }

        .tv-link { color: #38bdf8; text-decoration: none; font-weight: bold; transition: color 0.2s; }
        .tv-link:hover { color: #bae6fd; text-decoration: underline; }
        .fact-box { margin-top: 10px; background: rgba(255, 255, 255, 0.05); padding: 12px; border-radius: 8px; font-size: 0.9em; color: #cbd5e1; border-left: 3px solid #64748b; font-style: italic; flex-grow: 1; }

        .no-events { grid-column: 1 / -1; text-align: center; padding: 50px; font-size: 1.5em; color: var(--text-muted); background: rgba(30, 41, 59, 0.8); border-radius: 16px; backdrop-filter: blur(5px); }
        .loader { display: inline-block; width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.1); border-radius: 50%; border-top-color: #38bdf8; animation: spin 1s ease-in-out infinite; margin-bottom: 20px;}
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Botón CTA */
        .cta-container { display: flex; justify-content: center; margin-top: 25px; margin-bottom: 10px; width: 100%; }
        .cta { display: flex; align-items: center; padding: 10px 25px; text-decoration: none; font-size: 1em; font-weight: bold; color: white; background: #334155; transition: 1s; box-shadow: 6px 6px 0 #020617; transform: skewX(-15deg); border: none; cursor: pointer; }
        .cta:focus { outline: none; }
        .cta:hover { transition: 0.5s; box-shadow: 8px 8px 0 #38bdf8; }
        .cta .second { transition: 0.5s; margin-right: 0px; display: flex; align-items: center; }
        .cta:hover .second { transition: 0.5s; margin-right: 25px; }
        .span { transform: skewX(15deg); letter-spacing: 1px; }
        .second { width: 30px; margin-left: 20px; position: relative; }
        .one { transition: 0.4s; transform: translateX(-60%); }
        .two { transition: 0.5s; transform: translateX(-30%); }
        .cta:hover .three { animation: color_anim 1s infinite 0.2s; }
        .cta:hover .one { transform: translateX(0%); animation: color_anim 1s infinite 0.6s; }
        .cta:hover .two { transform: translateX(0%); animation: color_anim 1s infinite 0.4s; }
        @keyframes color_anim { 0% { fill: white; } 50% { fill: #38bdf8; } 100% { fill: white; } }

        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(5px); display: flex; justify-content: center; align-items: center; z-index: 9999; opacity: 0; pointer-events: none; transition: all 0.3s ease; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content { background: var(--card-bg); padding: 25px; border-radius: 16px; width: 90%; max-width: 320px; text-align: center; position: relative; box-shadow: 0 15px 40px rgba(0,0,0,0.8); transform: translateY(20px); transition: all 0.3s ease; }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .close-modal { position: absolute; top: 10px; right: 15px; font-size: 1.5em; cursor: pointer; color: var(--text-muted); transition: 0.2s; }
        .close-modal:hover { color: white; }
        .modal-title { margin-top: 0; margin-bottom: 20px; color: white; font-size: 1.2em; }
        .modal-buttons { display: flex; flex-direction: column; gap: 12px; }
        .cal-btn { display: block; text-align: center; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 1em; text-decoration: none; transition: 0.2s; }
        .cal-btn:hover { transform: translateY(-2px); }
        .google-btn { background-color: #3b82f6; color: white; }
        .google-btn:hover { background-color: #2563eb; }
        .apple-btn { background-color: #0f172a; color: white; border: 1px solid #334155; }
        .apple-btn:hover { background-color: #1e293b; }

    </style>
</head>
<body>

    <header>
        <h1>Race<span>Hub</span> 2026</h1>
        <div class="subtitle">Wiki de Carreras Dinámica. Horarios adaptados a tu zona.</div>
    </header>

    <div class="filters" id="filter-container">
        <button class="btn active" data-cat="all">🏁 Todo</button>

    </div>

    <div class="calendar-grid" id="events-grid">

            Conectando con Box... Descargando telemetría y horarios 📡
        </div>

    <div id="calendar-modal" class="modal-overlay">

                <a href="#" id="modal-google-btn" target="_blank" class="cal-btn google-btn" onclick="closeModal()">🔵 Google Calendar</a>
                <a href="#" id="modal-apple-btn" download="" class="cal-btn apple-btn" onclick="closeModal()">🍏 iPhone / Mac / Outlook</a>
            </div>
        </div>

    <script>
        // ID de tu Google Sheets Integrado
        const SHEET_ID = '1JoK-5nQjVQSSBL5-uxjOP13arS2zAFV8hPM38r93Wg4'; 
        
        let allEvents = [];
        let countdownInterval;

        const logos = {
            'f1': 'f1%20logo.jpg', 'motogp': 'motogp%20logo.jpeg', 'wec': 'wec%20logo.jpg',
            'gt3': 'gt3%20logo.png', 'gt4': 'gt4%20logo.png', 'dtm': 'dtm%20logo.png', 'nls': 'nls%20logo.webp'
        };

        const svgArrows = `
            <svg width="40px" height="15px" viewBox="0 0 66 43" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">

                <path class="three" d="M0.154393339,3.89485454 L3.97631488,0.139296592 C4.17083111,-0.0518420739 4.48263286,-0.0518571125 4.67716753,0.139262789 L25.6916134,20.7848311 C26.0855801,21.1718824 26.0911863,21.8050225 25.704135,22.1989893 C25.7000188,22.2031791 25.6958657,22.2073326 25.6916762,22.2114492 L4.67709797,42.8607841 C4.48259567,43.0519059 4.17082418,43.0519358 3.97628526,42.8608513 L0.154518591,39.1069479 C-0.0424848215,38.9134427 -0.0453206733,38.5968729 0.148184538,38.3998695 C0.150289256,38.3977268 0.152413239,38.395603 0.154556228,38.3934985 L16.9937789,21.8567812 C17.1908028,21.6632968 17.193672,21.3467273 17.0001876,21.1497035 C16.9980647,21.1475418 16.9959223,21.1453995 16.9937605,21.1432767 L0.15452076,4.60825197 C-0.0425130651,4.41477773 -0.0453986756,4.09820839 0.148075568,3.90117456 C0.150162624,3.89904911 0.152268631,3.89694235 0.154393339,3.89485454 Z" fill="#FFFFFF"></path>

        // =========================================================================
        // CARGA DESDE GOOGLE SHEETS
        // =========================================================================
        async function loadDataFromGoogleSheets() {
            const grid = document.getElementById('events-grid');
            const categories = ['f1', 'motogp', 'wec', 'gt3', 'gt4', 'dtm', 'nls'];
            
            try {
                const fetchPromises = categories.map(cat => {
                    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${cat}`;
                    return fetch(url).then(res => res.text()).then(text => {
                        // Limpia la respuesta para dejar el JSON puro
                        const jsonString = text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\);/)[1];
                        const data = JSON.parse(jsonString);
                        let catEvents = [];
                        
                        // Extraer cada fila, ignorando cabeceras
                        data.table.rows.forEach(row => {
                            if (row.c && row.c[0] && row.c[0].v && row.c[0].v.toLowerCase() !== 'nombre') {
                                // Mapeo de columnas: Nombre, Titulo, Fecha, Circuito, TV, Record, Año, Curiosidad
                                catEvents.push({
                                    cat: cat,
                                    name: row.c[0] ? row.c[0].v : '',
                                    title: row.c[1] ? row.c[1].v : '',
                                    date: row.c[2] ? row.c[2].v : '',
                                    circuit: row.c[3] ? row.c[3].v : '',
                                    tv: row.c[4] ? row.c[4].v : '',
                                    lapRecord: row.c[5] ? row.c[5].v : '',
                                    firstYear: row.c[6] ? row.c[6].v : '',
                                    fact: row.c[7] ? row.c[7].v : ''
                                });
                            }
                        });
                        return catEvents;
                    });
                });

                // Esperamos a tener todas las pestañas listas
                const results = await Promise.all(fetchPromises);
                allEvents = results.flat();
                
                // Renderizar inicialmente
                const activeBtn = document.querySelector('.btn.active');
                renderEvents(activeBtn ? activeBtn.getAttribute('data-cat') : 'all');

            } catch (e) {
                console.error("Error al descargar el Excel:", e);
                grid.innerHTML = `<div class="no-events">❌ Error de conexión.<br>Comprueba que tu hoja en Google Sheets tenga el acceso puesto a "Cualquier persona con el enlace".</div>`;
            }
        }

        // =========================================================================
        // FUNCIONES DE APOYO
        // =========================================================================
        function getChannelLink(cat) {
            if (cat === 'f1') return 'https://www.dazn.com/es-ES/l/formula-1/';
            if (cat === 'motogp') return 'https://www.dazn.com/es-ES/l/motogp/';
            if (cat === 'wec') return 'https://fiawec.tv/';
            if (cat === 'gt3' || cat === 'gt4') return 'https://www.youtube.com/c/GTWorld';
            if (cat === 'dtm') return 'https://www.youtube.com/@DTM';
            if (cat === 'nls') return 'https://www.youtube.com/c/N%C3%BCrburgring_official';
            return '#';
        }

        function filterPastEvents(eventsList) {
            const today = new Date().getTime();
            // Mostrar carreras que hayan sucedido hace menos de 24 horas (por si alguien entra el mismo domingo)
            return eventsList.filter(event => new Date(event.date).getTime() >= (today - 24*60*60*1000));
        }

        function generateSchedule(event) {
            const raceTime = new Date(event.date).getTime();
            const H = 60 * 60 * 1000;
            const D = 24 * H;
            
            if (event.cat === 'f1') {
                return [
                    { name: 'Libres 1', time: raceTime - 2*D - 3*H },
                    { name: 'Libres 2', time: raceTime - 2*D + 1*H },
                    { name: 'Libres 3', time: raceTime - 1*D - 2*H },
                    { name: 'Clasificación', time: raceTime - 1*D + 1*H },
                    { name: '🏁 Carrera', time: raceTime, isMain: true }
                ];
            } else if (event.cat === 'motogp') {
                return [
                    { name: 'Práctica Libre 1', time: raceTime - 2*D - 3*H },
                    { name: 'Práctica', time: raceTime - 2*D + 1*H },
                    { name: 'Clasificación', time: raceTime - 1*D - 3*H },
                    { name: 'Carrera Sprint', time: raceTime - 1*D + 1*H },
                    { name: '🏁 Carrera', time: raceTime, isMain: true }
                ];
            } else if (event.cat === 'wec') {
                 return [
                    { name: 'Prácticas', time: raceTime - 2*D },
                    { name: 'Hyperpole / Qualy', time: raceTime - 1*D },
                    { name: '🏁 Carrera', time: raceTime, isMain: true }
                ];
            } else if (event.cat === 'nls') {
                 return [
                    { name: 'Clasificación', time: raceTime - 2*H },
                    { name: '🏁 Carrera', time: raceTime, isMain: true }
                ];
            } else {
                 return [
                    { name: 'Prácticas', time: raceTime - 1*D - 3*H },
                    { name: 'Clasificación', time: raceTime - 1*D },
                    { name: '🏁 Carrera', time: raceTime, isMain: true }
                ];
            }
        }

        function formatFullDate(dateString) {
            const date = new Date(dateString);
            if (isNaN(date)) return "Fecha por confirmar";
            
            const options = { weekday: 'short', day: 'numeric', month: 'long', year: 'numeric' };
            let formatted = date.toLocaleDateString('es-ES', options);
            formatted = formatted.charAt(0).toUpperCase() + formatted.slice(1).replace('.,', ',');
            
            const timeOptions = { hour: '2-digit', minute: '2-digit' };
            const time = date.toLocaleTimeString('es-ES', timeOptions);
            
            return `${formatted} a las ${time}h`;
        }

        function formatSessionTime(timestamp) {
            const date = new Date(timestamp);
            let str = date.toLocaleString('es-ES', { weekday: 'short', hour: '2-digit', minute: '2-digit' });
            return str.charAt(0).toUpperCase() + str.slice(1).replace('.,', ',');
        }

        function getGoogleCalendarLink(event, schedule) {
            const startDate = event.date.replace(/[-:]/g, '').replace(/\..+/, '') + 'Z';
            const nextDay = new Date(new Date(event.date).getTime() + 2 * 60 * 60 * 1000); 
            const endDate = nextDay.toISOString().replace(/[-:]/g, '').replace(/\..+/, '') + 'Z';
            
            const titleText = encodeURIComponent(event.name + ': ' + event.title);
            const locationText = encodeURIComponent(event.circuit);
            
            let desc = `📺 TV: ${event.tv}\n⏱️ Récord: ${event.lapRecord}\n\n🗓️ PLANNING DEL FIN DE SEMANA:\n`;
            schedule.forEach(s => { desc += `- ${s.name}: ${formatSessionTime(s.time)} h\n`; });
            desc += `\n💡 Dato curioso:\n${event.fact}`;
            
            return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${titleText}&dates=${startDate}/${endDate}&details=${encodeURIComponent(desc)}&location=${locationText}`;
        }

        function getAppleCalendarLink(event, schedule) {
            const startDate = event.date.replace(/[-:]/g, '').replace(/\..+/, '') + 'Z';
            const nextDay = new Date(new Date(event.date).getTime() + 2 * 60 * 60 * 1000);
            const endDate = nextDay.toISOString().replace(/[-:]/g, '').replace(/\..+/, '') + 'Z';
            
            const titleText = event.name + ': ' + event.title;
            let desc = `📺 TV: ${event.tv}\\n⏱️ Récord: ${event.lapRecord}\\n\\n🗓️ PLANNING:\\n`;
            schedule.forEach(s => { desc += `- ${s.name}: ${formatSessionTime(s.time)} h\\n`; });
            desc += `\\n💡 Dato:\\n${event.fact}`;
            
            let icsFile = "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//RaceHub 2026//ES\nBEGIN:VEVENT\n";
            icsFile += "SUMMARY:" + titleText + "\nDTSTART:" + startDate + "\nDTEND:" + endDate + "\n";
            icsFile += "LOCATION:" + event.circuit + "\nDESCRIPTION:" + desc + "\nEND:VEVENT\nEND:VCALENDAR";
            return 'data:text/calendar;charset=utf8,' + encodeURIComponent(icsFile);
        }

        function openModal(btnElement) {
            const btn = btnElement.closest('.cta');
            const googleBtn = document.getElementById('modal-google-btn');
            const appleBtn = document.getElementById('modal-apple-btn');
            googleBtn.href = btn.dataset.google;
            appleBtn.href = btn.dataset.apple;
            appleBtn.download = btn.dataset.filename;
            document.getElementById('calendar-modal').classList.add('active');
        }

        function closeModal() { document.getElementById('calendar-modal').classList.remove('active'); }
        document.getElementById('calendar-modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

        function startCountdowns(eventsList) {
            if (countdownInterval) clearInterval(countdownInterval);

            countdownInterval = setInterval(() => {
                const now = new Date().getTime();

                eventsList.forEach((event, index) => {
                    const timerEl = document.getElementById(`timer-${index}`);
                    if (!timerEl) return;

                    const raceDate = new Date(event.date).getTime();
                    if(isNaN(raceDate)) {
                        timerEl.innerHTML = "Fecha pendiente";
                        return;
                    }
                    
                    const distance = raceDate - now;

                    if (distance < 0 && distance > -10800000) { 
                        timerEl.innerHTML = "🏁 ¡CARRERA EN DIRECTO!";
                        timerEl.style.color = "#E10600"; timerEl.style.borderColor = "#E10600";
                        return;
                    } else if (distance < 0) {
                        timerEl.innerHTML = "🏁 Evento Finalizado";
                        timerEl.style.color = "var(--text-muted)"; timerEl.style.borderColor = "var(--text-muted)";
                        return;
                    }

                    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                    const hStr = hours < 10 ? '0'+hours : hours;
                    const mStr = minutes < 10 ? '0'+minutes : minutes;
                    const sStr = seconds < 10 ? '0'+seconds : seconds;

                    timerEl.innerHTML = `⏱️ ${days}d ${hStr}h ${mStr}m ${sStr}s`;
                });
            }, 1000);
        }

        function renderEvents(filter = 'all') {
            const grid = document.getElementById('events-grid');
            grid.innerHTML = ''; 
            
            let filtered = filter !== 'all' ? allEvents.filter(e => e.cat === filter) : allEvents;
            let futureEvents = filterPastEvents(filtered);
            futureEvents.sort((a, b) => new Date(a.date) - new Date(b.date));

            if(futureEvents.length === 0) {
                grid.innerHTML = '<div class="no-events">No hay próximos eventos en el calendario o faltan datos.</div>';
                if(countdownInterval) clearInterval(countdownInterval);
                return;
            }

            futureEvents.forEach((event, index) => {
                const schedule = generateSchedule(event);
                const googleUrl = getGoogleCalendarLink(event, schedule);
                const appleUrl = getAppleCalendarLink(event, schedule);
                const safeFileName = event.title.replace(/\s+/g, '_') + '.ics';
                const logoImgSrc = logos[event.cat];
                const channelUrl = getChannelLink(event.cat);
                
                let scheduleHtml = '';
                schedule.forEach(s => {
                    const liClass = s.isMain ? 'main-race' : '';
                    scheduleHtml += `<li class="${liClass}"><span>${s.name}</span> <span>${formatSessionTime(s.time)}</span></li>`;
                });

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-header bg-${event.cat}">
                        <span>${event.name}</span>
                        <img src="${logoImgSrc}" alt="${event.name} logo" class="cat-logo" onerror="this.style.display='none'">
                    </div>
                    <div class="card-body">
                        <div class="countdown-badge" id="timer-${index}">Calculando...</div>
                        
                        <h2 class="event-title">${event.title}</h2>
                        
                        <div class="info-row"><span class="icon">📍</span><span><strong>${event.circuit}</strong></span></div>
                        <div class="info-row"><span class="icon">📅</span><span><strong>${formatFullDate(event.date)}</strong></span></div>
                        
                        <details class="schedule-accordion">
                            <summary>🗓️ Ver horarios del fin de semana</summary>
                            <ul class="schedule-list">${scheduleHtml}</ul>
                        </details>

                        <div class="info-row" style="margin-top: 10px;"><span class="icon">🏛️</span><span>Primera edición: <strong>${event.firstYear}</strong></span></div>
                        <div class="info-row"><span class="icon">⏱️</span><span>Récord: <strong>${event.lapRecord}</strong></span></div>
                        <div class="info-row"><span class="icon">📺</span><span>TV: <a href="${channelUrl}" target="_blank" class="tv-link">${event.tv}</a></span></div>

                        <div class="fact-box">" ${event.fact} "</div>
                        
                        <div class="cta-container">
                            <button class="cta" data-google="${googleUrl}" data-apple="${appleUrl}" data-filename="${safeFileName}" onclick="openModal(this)">
                                <span class="span">AÑADIR</span>
                                <span class="second">${svgArrows}</span>
                            </button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });

            startCountdowns(futureEvents);
        }

        // =========================================================================
        // INICIALIZACIÓN DE LA PÁGINA
        // =========================================================================
        buttons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                buttons.forEach(b => b.classList.remove('active'));
                const targetBtn = e.target.closest('.btn');
                targetBtn.classList.add('active');
                renderEvents(targetBtn.getAttribute('data-cat'));
            });
        });

        // Al abrir la página, ejecuta la conexión con tu Google Sheets
        window.onload = loadDataFromGoogleSheets;

    </script>
</body>
</html>
