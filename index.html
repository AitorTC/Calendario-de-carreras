<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaceHub PRO - Motor Enciclopedia 2026</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --f1-color: #E10600;
            --motogp-color: #df2020;
            --wec-color: #2563eb;
            --gt3-color: #0ea5e9;
            --gt4-color: #ea580c;
            --dtm-color: #eab308;
            --nls-color: #16a34a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            
            /* --- FONDO ANIMADO UIVERSE --- */
            background: #121212; 
            background: linear-gradient(
                135deg,
                #121212 25%,
                #1a1a1a 25%,
                #1a1a1a 50%,
                #121212 50%,
                #121212 75%,
                #1a1a1a 75%,
                #1a1a1a
            );
            background-size: 40px 40px;
            background-attachment: fixed; /* Hace que el fondo no se desplace con el scroll */
            animation: move 4s linear infinite;
        }

        @keyframes move {
            0% { background-position: 0 0; }
            100% { background-position: 40px 40px; }
        }
        /* ------------------------------- */

        header {
            background-color: rgba(2, 6, 23, 0.85); /* Un poco transparente para ver el fondo */
            backdrop-filter: blur(10px); /* Efecto cristal */
            padding: 40px 20px;
            text-align: center;
            border-bottom: 2px solid #334155;
            position: relative;
        }

        h1 { margin: 0; font-size: 2.8em; font-weight: 900; letter-spacing: -1px; }
        h1 span { color: var(--f1-color); }
        .subtitle { color: var(--text-muted); font-size: 1.1em; margin-top: 10px; }

        .filters {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            padding: 20px;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(8px);
            z-index: 100;
        }

        .btn {
            background-color: #334155;
            color: white;
            border: 2px solid transparent;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            height: 42px;
        }

        .btn:hover { transform: translateY(-2px); }
        .btn.active { background-color: white; color: black; }
        
        .cat-logo {
            height: 22px;
            width: auto;
            background-color: white; 
            padding: 2px 6px;
            border-radius: 4px;
            object-fit: contain;
        }

        .btn[data-cat="f1"]:hover, .btn[data-cat="f1"].active { background-color: var(--f1-color); color: white; border-color: var(--f1-color); }
        .btn[data-cat="motogp"]:hover, .btn[data-cat="motogp"].active { background-color: var(--motogp-color); color: white; border-color: var(--motogp-color); }
        .btn[data-cat="wec"]:hover, .btn[data-cat="wec"].active { background-color: var(--wec-color); color: white; border-color: var(--wec-color); }
        .btn[data-cat="gt3"]:hover, .btn[data-cat="gt3"].active { background-color: var(--gt3-color); color: white; border-color: var(--gt3-color); }
        .btn[data-cat="gt4"]:hover, .btn[data-cat="gt4"].active { background-color: var(--gt4-color); color: white; border-color: var(--gt4-color); }
        .btn[data-cat="dtm"]:hover, .btn[data-cat="dtm"].active { background-color: var(--dtm-color); color: black; border-color: var(--dtm-color); }
        .btn[data-cat="nls"]:hover, .btn[data-cat="nls"].active { background-color: var(--nls-color); color: white; border-color: var(--nls-color); }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.8); /* Sombra más fuerte para que resalte sobre el fondo oscuro */
            transition: transform 0.2s ease;
            position: relative;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.05); /* Borde muy sutil */
        }
        .card:hover { transform: scale(1.02); }

        .card-header {
            padding: 10px 20px;
            font-weight: 800;
            font-size: 1.1em;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .bg-f1 { background-color: var(--f1-color); color: white; }
        .bg-motogp { background-color: var(--motogp-color); color: white; }
        .bg-wec { background-color: var(--wec-color); color: white; }
        .bg-gt3 { background-color: var(--gt3-color); color: white; }
        .bg-gt4 { background-color: var(--gt4-color); color: white; }
        .bg-dtm { background-color: var(--dtm-color); color: black; }
        .bg-nls { background-color: var(--nls-color); color: white; }

        .card-body { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; gap: 12px;}
        .event-title { margin: 0 0 5px 0; font-size: 1.5em; line-height: 1.2; }
        
        .countdown-badge {
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 1.15em;
            text-align: center;
            font-weight: bold;
            color: #38bdf8;
            border: 1px solid rgba(56, 189, 248, 0.2);
            margin-bottom: 5px;
        }

        .info-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            color: var(--text-muted);
            font-size: 0.95em;
        }
        .info-row strong { color: var(--text-main); }
        .icon { font-size: 1.2em; min-width: 25px; text-align: center; }
        
        .tv-link {
            color: #38bdf8;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.2s;
        }
        .tv-link:hover {
            color: #bae6fd;
            text-decoration: underline;
        }

        .fact-box {
            margin-top: 10px;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9em;
            color: #cbd5e1;
            border-left: 3px solid #64748b;
            font-style: italic;
            flex-grow: 1;
        }

        .no-events {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px;
            font-size: 1.5em;
            color: var(--text-muted);
            background: rgba(30, 41, 59, 0.8);
            border-radius: 16px;
            backdrop-filter: blur(5px);
        }

        /* --- BOTÓN ANIMADO "NEXT" ADAPTADO --- */
        .cta-container {
            display: flex;
            justify-content: center;
            margin-top: 25px;
            margin-bottom: 10px; 
            width: 100%;
        }

        .cta {
            display: flex;
            align-items: center;
            padding: 10px 25px;
            text-decoration: none;
            font-size: 1em;
            font-weight: bold;
            color: white;
            background: #334155; 
            transition: 1s;
            box-shadow: 6px 6px 0 #020617; 
            transform: skewX(-15deg);
            border: none;
            cursor: pointer;
        }

        .cta:focus { outline: none; }

        .cta:hover {
            transition: 0.5s;
            box-shadow: 8px 8px 0 #38bdf8; 
        }

        .cta .second {
            transition: 0.5s;
            margin-right: 0px;
            display: flex;
            align-items: center;
        }

        .cta:hover .second {
            transition: 0.5s;
            margin-right: 25px; 
        }

        .span {
            transform: skewX(15deg);
            letter-spacing: 1px;
        }

        .second {
            width: 30px;
            margin-left: 20px;
            position: relative;
        }

        .one { transition: 0.4s; transform: translateX(-60%); }
        .two { transition: 0.5s; transform: translateX(-30%); }

        .cta:hover .three { animation: color_anim 1s infinite 0.2s; }
        .cta:hover .one { transform: translateX(0%); animation: color_anim 1s infinite 0.6s; }
        .cta:hover .two { transform: translateX(0%); animation: color_anim 1s infinite 0.4s; }

        @keyframes color_anim {
            0% { fill: white; }
            50% { fill: #38bdf8; } 
            100% { fill: white; }
        }
        /* ------------------------------------- */

        /* Estilos del Popup / Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); /* Ligeramente más oscuro para tapar la animación */
            backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            opacity: 0; pointer-events: none;
            transition: all 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        
        .modal-content {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            width: 90%; max-width: 320px;
            text-align: center; position: relative;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            transform: translateY(20px);
            transition: all 0.3s ease;
        }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        
        .close-modal {
            position: absolute; top: 10px; right: 15px;
            font-size: 1.5em; cursor: pointer;
            color: var(--text-muted); transition: 0.2s;
        }
        .close-modal:hover { color: white; }
        .modal-title { margin-top: 0; margin-bottom: 20px; color: white; font-size: 1.2em; }
        
        .modal-buttons { display: flex; flex-direction: column; gap: 12px; }
        .cal-btn {
            display: block; text-align: center; padding: 12px;
            border-radius: 8px; font-weight: bold; font-size: 1em;
            text-decoration: none; transition: 0.2s;
        }
        .cal-btn:hover { transform: translateY(-2px); }
        .google-btn { background-color: #3b82f6; color: white; }
        .google-btn:hover { background-color: #2563eb; }
        .apple-btn { background-color: #0f172a; color: white; border: 1px solid #334155; }
        .apple-btn:hover { background-color: #1e293b; }

    </style>
</head>

        function getChannelLink(cat) {
            if (cat === 'f1') return 'https://www.dazn.com/es-ES/l/formula-1/';
            if (cat === 'motogp') return 'https://www.dazn.com/es-ES/l/motogp/';
            if (cat === 'wec') return 'https://fiawec.tv/';
            if (cat === 'gt3' || cat === 'gt4') return 'https://www.youtube.com/c/GTWorld';
            if (cat === 'dtm') return 'https://www.youtube.com/@DTM';
            if (cat === 'nls') return 'https://www.youtube.com/c/N%C3%BCrburgring_official';
            return '#';
        }

        function filterPastEvents(eventsList) {
            const today = new Date();
            today.setHours(0, 0, 0, 0); 
            return eventsList.filter(event => new Date(event.date) >= today);
        }

        function formatDate(dateString) {
            const options = { day: 'numeric', month: 'long', timeZone: 'UTC' };
            const date = new Date(dateString);
            return date.toLocaleDateString('es-ES', options);
        }

        function getGoogleCalendarLink(event) {
            const startDate = event.date.replace(/-/g, '');
            const nextDay = new Date(event.date);
            nextDay.setDate(nextDay.getDate() + 1);
            const endDate = nextDay.toISOString().split('T')[0].replace(/-/g, '');
            const titleText = encodeURIComponent(event.name + ': ' + event.title);
            const locationText = encodeURIComponent(event.circuit);
            const descriptionText = encodeURIComponent('📺 TV: ' + event.tv + '\n⏱️ Récord: ' + event.lapRecord + '\n\n💡 Dato curioso:\n' + event.fact);
            return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${titleText}&dates=${startDate}/${endDate}&details=${descriptionText}&location=${locationText}`;
        }

        function getAppleCalendarLink(event) {
            const startDate = event.date.replace(/-/g, '');
            const nextDay = new Date(event.date);
            nextDay.setDate(nextDay.getDate() + 1);
            const endDate = nextDay.toISOString().split('T')[0].replace(/-/g, '');
            const titleText = event.name + ': ' + event.title;
            const descriptionText = '📺 TV: ' + event.tv + '\\n⏱️ Récord: ' + event.lapRecord + '\\n\\n💡 Dato curioso:\\n' + event.fact;
            let icsFile = "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//RaceHub 2026//ES\nBEGIN:VEVENT\n";
            icsFile += "SUMMARY:" + titleText + "\nDTSTART;VALUE=DATE:" + startDate + "\nDTEND;VALUE=DATE:" + endDate + "\n";
            icsFile += "LOCATION:" + event.circuit + "\nDESCRIPTION:" + descriptionText + "\nEND:VEVENT\nEND:VCALENDAR";
            return 'data:text/calendar;charset=utf8,' + encodeURIComponent(icsFile);
        }

        function openModal(btnElement) {
            // Buscamos el botón padre .cta para leer los datos que hemos inyectado
            const btn = btnElement.closest('.cta');
            const googleBtn = document.getElementById('modal-google-btn');
            const appleBtn = document.getElementById('modal-apple-btn');
            googleBtn.href = btn.dataset.google;
            appleBtn.href = btn.dataset.apple;
            appleBtn.download = btn.dataset.filename;
            document.getElementById('calendar-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('calendar-modal').classList.remove('active');
        }

        document.getElementById('calendar-modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        function startCountdowns(eventsList) {
            if (countdownInterval) clearInterval(countdownInterval);

            countdownInterval = setInterval(() => {
                const now = new Date().getTime();

                eventsList.forEach((event, index) => {
                    const timerEl = document.getElementById(`timer-${index}`);
                    if (!timerEl) return;

                    const raceDate = new Date(event.date + "T14:00:00Z").getTime();
                    const distance = raceDate - now;

                    if (distance < 0) {
                        timerEl.innerHTML = "🏁 ¡Día de carrera!";
                        return;
                    }

                    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                    const hStr = hours < 10 ? '0'+hours : hours;
                    const mStr = minutes < 10 ? '0'+minutes : minutes;
                    const sStr = seconds < 10 ? '0'+seconds : seconds;

                    timerEl.innerHTML = `⏱️ ${days}d ${hStr}h ${mStr}m ${sStr}s`;
                });
            }, 1000);
        }

        function renderEvents(filter = 'all') {
            grid.innerHTML = ''; 

            let filtered = allEvents;
            if (filter !== 'all') {
                filtered = allEvents.filter(e => e.cat === filter);
            }

            let futureEvents = filterPastEvents(filtered);
            futureEvents.sort((a, b) => new Date(a.date) - new Date(b.date));

            if(futureEvents.length === 0) {
                grid.innerHTML = '<div class="no-events">No hay próximos eventos de esta categoría.</div>';
                if(countdownInterval) clearInterval(countdownInterval);
                return;
            }

            futureEvents.forEach((event, index) => {
                const googleUrl = getGoogleCalendarLink(event);
                const appleUrl = getAppleCalendarLink(event);
                const safeFileName = event.title.replace(/\s+/g, '_') + '.ics';
                const logoImgSrc = logos[event.cat];
                const channelUrl = getChannelLink(event.cat);

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-header bg-${event.cat}">
                        <span>${event.name}</span>
                        <img src="${logoImgSrc}" alt="${event.name} logo" class="cat-logo">
                    </div>
                    <div class="card-body">
                        <div class="countdown-badge" id="timer-${index}">Calculando...</div>
                        
                        <h2 class="event-title">${event.title}</h2>
                        
                        <div class="info-row"><span class="icon">📅</span><span><strong>${formatDate(event.date)}</strong> de 2026</span></div>
                        <div class="info-row"><span class="icon">📍</span><span><strong>${event.circuit}</strong></span></div>
                        <div class="info-row"><span class="icon">🏛️</span><span>Primera edición: <strong>${event.firstYear}</strong></span></div>
                        <div class="info-row"><span class="icon">⏱️</span><span>Récord: <strong>${event.lapRecord}</strong></span></div>
                        <div class="info-row"><span class="icon">📺</span><span>TV: <a href="${channelUrl}" target="_blank" class="tv-link">${event.tv}</a></span></div>

                        <div class="fact-box">" ${event.fact} "</div>
                        
                        <div class="cta-container">
                            <button class="cta" data-google="${googleUrl}" data-apple="${appleUrl}" data-filename="${safeFileName}" onclick="openModal(this)">
                                <span class="span">AÑADIR</span>
                                <span class="second">${svgArrows}</span>
                            </button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });

            startCountdowns(futureEvents);
        }

        buttons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                buttons.forEach(b => b.classList.remove('active'));
                const targetBtn = e.target.closest('.btn');
                targetBtn.classList.add('active');
                renderEvents(targetBtn.getAttribute('data-cat'));
            });
        });

        renderEvents();
    </script>
</body>
</html>
